worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/html text/css text/plain application/javascript application/json application/xml;

    # --- Upload cap (future file uploads) ---
    client_max_body_size 10M;

    # --- Proxy timeouts ---
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # --- WebSocket upgrade map ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- Rate limit zone: 100 req/min per IP on /api/ ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    upstream backend_upstream  { server backend:8000; }
    upstream frontend_upstream { server frontend:3000; }
    upstream flower_upstream   { server flower:5555; }

    # --- HTTP → HTTPS redirect ---
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # --- HTTPS server ---
    server {
        listen 443 ssl http2;
        server_name _;

        # Certbot will replace these stub certs with real ones on deploy.
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # TLS 1.2 + 1.3 only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # --- Security headers (on every response) ---
        add_header X-Frame-Options           "DENY"                           always;
        add_header X-Content-Type-Options    "nosniff"                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # --- Custom 429 JSON body ---
        error_page 429 = @ratelimited;
        location @ratelimited {
            default_type application/json;
            return 429 '{"error":"rate_limited","message":"Too many requests, please slow down."}';
        }

        # --- API: strip /api prefix ---
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # --- Flower (Celery dashboard) ---
        location /flower/ {
            proxy_pass http://flower_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # --- Frontend (Next.js) ---
        location / {
            proxy_pass http://frontend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }
    }
}
