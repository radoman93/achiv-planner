networks:
  wow_optimizer_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  raw_storage:

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wow_optimizer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wow -d wow_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    networks:
      - wow_optimizer_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6380:6379"
    networks:
      - wow_optimizer_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://wow:${POSTGRES_PASSWORD}@postgres:5432/wow_optimizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: "60"
      BATTLENET_CLIENT_ID: ${BATTLENET_CLIENT_ID}
      BATTLENET_CLIENT_SECRET: ${BATTLENET_CLIENT_SECRET}
      BATTLENET_REDIRECT_URI: ${BATTLENET_REDIRECT_URI:-https://example.com/api/auth/battlenet/callback}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_ENRICHMENT_ENABLED: ${LLM_ENRICHMENT_ENABLED:-false}
      LLM_ENRICHMENT_MODE: ${LLM_ENRICHMENT_MODE:-dry_run}
      LLM_SAMPLE_IDS: ${LLM_SAMPLE_IDS:-1,6,45,500,1000}
      LLM_DEFAULT_MODEL: claude-haiku-4-5-20251001
      LLM_COMPLEX_MODEL: claude-sonnet-4-20250514
      LLM_MONTHLY_BUDGET_USD: "25.0"
      LLM_BUDGET_HARD_STOP_USD: "20.0"
      LLM_BATCH_MIN_SIZE: "20"
      LLM_MAX_OUTPUT_TOKENS: "800"
      RAW_STORAGE_PATH: /raw_storage
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - raw_storage:/raw_storage
    ports:
      - "9090:8000"
    networks:
      - wow_optimizer_network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A celery_worker.celery_app worker
      --loglevel=info
      -Q high_priority,normal,llm_enrichment,sync
      --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://wow:${POSTGRES_PASSWORD}@postgres:5432/wow_optimizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_ENRICHMENT_ENABLED: ${LLM_ENRICHMENT_ENABLED:-false}
      LLM_ENRICHMENT_MODE: ${LLM_ENRICHMENT_MODE:-dry_run}
      LLM_SAMPLE_IDS: ${LLM_SAMPLE_IDS:-1,6,45,500,1000}
      LLM_DEFAULT_MODEL: claude-haiku-4-5-20251001
      LLM_COMPLEX_MODEL: claude-sonnet-4-20250514
      LLM_MONTHLY_BUDGET_USD: "25.0"
      LLM_BUDGET_HARD_STOP_USD: "20.0"
      LLM_BATCH_MIN_SIZE: "20"
      LLM_MAX_OUTPUT_TOKENS: "800"
      RAW_STORAGE_PATH: /raw_storage
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - raw_storage:/raw_storage
    networks:
      - wow_optimizer_network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    exclude_from_hc: true
    command: celery -A celery_worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://wow:${POSTGRES_PASSWORD}@postgres:5432/wow_optimizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOG_LEVEL: INFO
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wow_optimizer_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - wow_optimizer_network

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5555"
    command: >
      celery -A celery_worker.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    environment:
      DATABASE_URL: postgresql+asyncpg://wow:${POSTGRES_PASSWORD}@postgres:5432/wow_optimizer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    networks:
      - wow_optimizer_network
